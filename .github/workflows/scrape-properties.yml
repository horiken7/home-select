name: Scrape Rental Properties

on:
  workflow_dispatch:
  schedule:
    - cron: "10 21 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/scrape-properties.mjs"
      - "app.js"
      - "config.js"
      - "package.json"
      - ".github/workflows/scrape-properties.yml"

permissions:
  contents: write

concurrency:
  group: scrape-rental-properties
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        timeout-minutes: 5
        run: npm install --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Chromium
        timeout-minutes: 8
        run: npx playwright install --with-deps chromium

      - name: Scrape property data
        timeout-minutes: 10
        run: npm run scrape:properties

      - name: Commit updated data
        timeout-minutes: 3
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/properties.json data/scrape-diagnostics.json
          if git diff --cached --quiet; then
            echo "No property data changes."
          else
            git commit -m "Update scraped rental properties"
            git push
          fi
