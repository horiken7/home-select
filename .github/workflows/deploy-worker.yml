name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "workers/**"
      - "worker-entry.js"
      - "wrangler.toml"
      - "package.json"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Google API Key Secret if present
        run: |
          if [ -n "$GOOGLE_API_KEY" ]; then
            echo "$GOOGLE_API_KEY" | npx wrangler secret put GOOGLE_API_KEY
          else
            echo "GOOGLE_API_KEY is not set. Skipping."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Set Google CSE ID Secret if present
        run: |
          if [ -n "$GOOGLE_CSE_ID" ]; then
            echo "$GOOGLE_CSE_ID" | npx wrangler secret put GOOGLE_CSE_ID
          else
            echo "GOOGLE_CSE_ID is not set. Skipping."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
